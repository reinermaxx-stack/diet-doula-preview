    // =====================================================================
    // SMART RECOMMENDATION ENGINE
    // Prioritizes foods based on: nutrient gaps, trimester, restrictions
    // =====================================================================
    function getSmartRecommendations(categoryKey, totals, trimester, calorieTarget, restrictions) {
      const pool = allFoods[categoryKey] || [];

      // Filter out restricted items
      const restricted = (restrictions || []).map(r => r.toLowerCase());
      const isRestricted = (food) => {
        const name = food.name.toLowerCase();
        const tags = (food.tags || []).map(t => t.toLowerCase());
        for (const r of restricted) {
          if (r.includes("gluten") && (tags.includes("whole-grain") || name.includes("pasta") || name.includes("toast") || name.includes("wrap") || name.includes("pancake") || name.includes("cracker") || name.includes("muffin") || name.includes("cereal"))) return true;
          if (r.includes("dairy") && (tags.includes("dairy") || name.includes("cheese") || name.includes("yogurt") || name.includes("milk"))) return true;
          if (r.includes("vegan") && (name.includes("chicken") || name.includes("steak") || name.includes("salmon") || name.includes("turkey") || name.includes("egg") || name.includes("shrimp") || name.includes("cod") || name.includes("sardine") || name.includes("meatball") || name.includes("meatloaf") || tags.includes("dairy"))) return true;
          if (r.includes("vegetarian") && (name.includes("chicken") || name.includes("steak") || name.includes("salmon") || name.includes("turkey") || name.includes("shrimp") || name.includes("cod") || name.includes("sardine") || name.includes("meatball") || name.includes("meatloaf"))) return true;
          if ((r.includes("raw fish") || r.includes("sushi")) && name.includes("sashimi")) return true;
          if (r.includes("nut") && (name.includes("almond") || name.includes("peanut") || name.includes("walnut") || tags.includes("portable") && name.includes("trail"))) return true;
        }
        return false;
      };

      const eligible = pool.filter(f => !isRestricted(f));

      // Calculate nutrient gap scores — what does the user need most right now?
      const gapScores = {
        iron: Math.max(0, 1 - totals.iron / pregnancyRDA.iron),
        folate: Math.max(0, 1 - totals.folate / pregnancyRDA.folate),
        calcium: Math.max(0, 1 - totals.calcium / pregnancyRDA.calcium),
        fiber: Math.max(0, 1 - totals.fiber / pregnancyRDA.fiber),
        protein: Math.max(0, 1 - totals.protein / pregnancyRDA.protein),
        dha: Math.max(0, 1 - totals.dha / pregnancyRDA.dha),
        choline: Math.max(0, 1 - totals.choline / pregnancyRDA.choline),
      };

      // Score each food
      const scored = eligible.map(food => {
        let score = 0;

        // Nutrient gap matching: foods that fill current gaps score higher
        (food.richIn || []).forEach(nutrient => {
          if (gapScores[nutrient] !== undefined) {
            score += gapScores[nutrient] * 3; // Weight: gap importance
          }
          // Trimester-specific boosts
          if (trimester === 1 && (nutrient === "folate" || nutrient === "choline")) score += 1.5;
          if (trimester === 2 && (nutrient === "omega3" || nutrient === "protein" || nutrient === "iron")) score += 1.2;
          if (trimester === 3 && (nutrient === "calcium" || nutrient === "protein" || nutrient === "potassium")) score += 1.2;
        });

        // Trimester-specific food boost
        if ((food.trimBoost || []).includes(trimester)) score += 0.5;

        // First trimester: boost nausea-friendly foods
        if (trimester === 1 && (food.tags || []).includes("nausea-friendly")) score += 1.0;

        // Slight variety randomization (deterministic per day)
        const dayHash = new Date().getDate();
        score += ((food.name.charCodeAt(0) + dayHash) % 5) * 0.1;

        return { ...food, _score: score };
      });

      // Sort by score descending, return top items
      scored.sort((a, b) => b._score - a._score);
      return scored.slice(0, 5);
    }

    const trimesterData = {

    // --- Credentials Screen (Username/Password + Social Sign-In) ---
    function CredentialsScreen({ data, setData, onNext, onBack }) {
      const [username, setUsername] = useState(data.username || "");
      const [password, setPassword] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [showPassword, setShowPassword] = useState(false);
      const [error, setError] = useState("");

      const passwordValid = password.length >= 8;
      const passwordsMatch = password === confirmPassword;
      const canCreate = username.length >= 3 && passwordValid && passwordsMatch;

      const handleCreate = () => {
        if (!canCreate) {
          if (username.length < 3) setError("Username must be at least 3 characters");
          else if (!passwordValid) setError("Password must be at least 8 characters");
          else if (!passwordsMatch) setError("Passwords do not match");
          return;
        }
        setData({ ...data, username, authMethod: "email" });
        onNext();
      };

      const handleSocialLogin = (provider) => {
        setData({ ...data, username: data.firstName || provider + " User", authMethod: provider });
        onNext();
      };

      return (
        <div style={{ flex: 1, overflow: "auto", padding: "24px 28px", background: c.cream }}>
          {/* Progress bar - 5 segments, all filled */}
          <div style={{ display: "flex", gap: 8, marginBottom: 28 }}>

    // --- Calorie Ring SVG ---
    function CalorieRing({ consumed, target, size = 140 }) {
      const r = (size - 16) / 2;
      const circumference = 2 * Math.PI * r;
      const pct = Math.min(consumed / target, 1);
      const offset = circumference * (1 - pct);
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c.borderLight} strokeWidth="10" />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c.pink} strokeWidth="10"
            strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset}
            transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition: "stroke-dashoffset 0.6s ease" }} />
          <text x={size/2} y={size/2 - 6} textAnchor="middle" fontSize="28" fontWeight="800" fill={c.textDark} fontFamily="'Nunito', sans-serif">{consumed}</text>
          <text x={size/2} y={size/2 + 14} textAnchor="middle" fontSize="12" fill={c.textLight} fontFamily="'Nunito', sans-serif">/ {target}</text>
        </svg>
      );
    }

    // --- Nutritionix Food Search Component ---
    // Uses Nutritionix API v2 for meal-level search (e.g. "chicken parmesan", "beef tacos")
    // Two-step flow: 1) /v2/search/instant for autocomplete, 2) /v2/natural/nutrients for full nutrition
    const NUTRITIONIX_APP_ID = "a]"; // Replace with your Nutritionix App ID
    const NUTRITIONIX_APP_KEY = "b"; // Replace with your Nutritionix App Key
    const NX_HEADERS = { "x-app-id": NUTRITIONIX_APP_ID, "x-app-key": NUTRITIONIX_APP_KEY, "Content-Type": "application/json" };

    function FoodSearch({ onAdd, mealCategory }) {
      const [query, setQuery] = useState("");
      const [instantResults, setInstantResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [loadingNutrients, setLoadingNutrients] = useState(null); // tracks which item is loading details
      const [expanded, setExpanded] = useState(false);
      const [addedNames, setAddedNames] = useState(new Set());
      const [error, setError] = useState(null);
      const timerRef = useRef(null);

      // Step 1: Instant search (autocomplete)
      const searchInstant = (q) => {
        if (!q || q.length < 2) { setInstantResults([]); return; }
        setLoading(true);
        setError(null);
        fetch(`https://trackapi.nutritionix.com/v2/search/instant?query=${encodeURIComponent(q)}`, { headers: NX_HEADERS })
          .then(r => {
            if (!r.ok) throw new Error(r.status === 401 ? "api_key" : "request");
            return r.json();
          })
          .then(data => {
            // Combine common foods and branded foods
            const common = (data.common || []).map(f => ({
              type: "common",
              name: f.food_name,
              photo: f.photo?.thumb || null,
              serving: f.serving_qty && f.serving_unit ? `${f.serving_qty} ${f.serving_unit}` : null,
              tag: f.tag_name || f.food_name,
            }));
            const branded = (data.branded || []).slice(0, 5).map(f => ({
              type: "branded",
              name: f.food_name,
              brand: f.brand_name || null,
              photo: f.photo?.thumb || null,
              serving: f.serving_qty && f.serving_unit ? `${f.serving_qty} ${f.serving_unit}` : null,
              nix_item_id: f.nix_item_id,
              calories: f.nf_calories || null,
            }));
            setInstantResults([...common.slice(0, 10), ...branded]);
            setLoading(false);
          })
          .catch(err => {
            setLoading(false);
            if (err.message === "api_key") {
              setError("api_key");
              // Fallback: use USDA if Nutritionix key is invalid
              fallbackUSDA(q);
            } else {
              setError("network");
            }
          });
      };

      // Fallback to USDA if Nutritionix fails
      const fallbackUSDA = (q) => {
        setLoading(true);
        fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?api_key=DEMO_KEY&query=${encodeURIComponent(q)}&pageSize=10&dataType=Foundation,SR%20Legacy`)
          .then(r => r.json())
          .then(data => {
            const nutrientMap = { 1008: "calories", 1003: "protein", 1005: "carbs", 1004: "fat", 1089: "iron", 1187: "folate", 1087: "calcium", 1079: "fiber" };
            const items = (data.foods || []).map(f => {
              const n = {};
              (f.foodNutrients || []).forEach(fn => {
                if (nutrientMap[fn.nutrientId]) n[nutrientMap[fn.nutrientId]] = Math.round(fn.value * 10) / 10;
              });
              return {
                type: "usda", name: f.description, resolved: true,
                calories: n.calories || 0, protein: n.protein || 0, carbs: n.carbs || 0, fat: n.fat || 0,
                iron: n.iron || 0, folate: n.folate || 0, calcium: n.calcium || 0, fiber: n.fiber || 0,
                serving: "100g",
              };
            });
            setInstantResults(items);
            setLoading(false);
            setError("usda_fallback");
          })
          .catch(() => { setLoading(false); });
      };

      // Step 2: Get full nutrients for a common food via natural language
      const getNutrients = (item, index) => {
        if (item.resolved) {
          // Already have nutrients (branded or USDA fallback) — add directly
          handleAdd(item);
          return;
        }
        setLoadingNutrients(index);
        fetch("https://trackapi.nutritionix.com/v2/natural/nutrients", {
          method: "POST",
          headers: NX_HEADERS,
          body: JSON.stringify({ query: item.name }),
        })
          .then(r => r.json())
          .then(data => {
            const f = data.foods?.[0];
            if (f) {
              const resolved = {
                name: f.food_name,
                calories: Math.round(f.nf_calories || 0),
                protein: Math.round((f.nf_protein || 0) * 10) / 10,
                carbs: Math.round((f.nf_total_carbohydrate || 0) * 10) / 10,
                fat: Math.round((f.nf_total_fat || 0) * 10) / 10,
                iron: 0, folate: 0, calcium: 0, fiber: Math.round((f.nf_dietary_fiber || 0) * 10) / 10,

              (f.full_nutrients || []).forEach(n => {

                if (n.attr_id === 435) resolved.folate = Math.round(n.value * 10) / 10;    // Folate DFE

        { key: "iron", label: "Iron", gap: Math.max(0, 1 - totals.iron / pregnancyRDA.iron) },
        { key: "folate", label: "Folate", gap: Math.max(0, 1 - totals.folate / pregnancyRDA.folate) },
        { key: "calcium", label: "Calcium", gap: Math.max(0, 1 - totals.calcium / pregnancyRDA.calcium) },
        { key: "fiber", label: "Fiber", gap: Math.max(0, 1 - totals.fiber / pregnancyRDA.fiber) },
        { key: "protein", label: "Protein", gap: Math.max(0, 1 - totals.protein / pregnancyRDA.protein) },
        { key: "dha", label: "DHA", gap: Math.max(0, 1 - totals.dha / pregnancyRDA.dha) },
        { key: "choline", label: "Choline", gap: Math.max(0, 1 - totals.choline / pregnancyRDA.choline) },
      ].filter(g => g.gap > 0.15).sort((a, b) => b.gap - a.gap);

      const topGapKeys = gaps.slice(0, 4).map(g => g.key);

      // Static grocery items by store section, tagged with nutrients they support
      const groceryItems = [
        // Produce
        { name: "Spinach (baby)", icon: "🥬", section: "Produce", nutrients: ["iron", "folate", "fiber"], note: "131mcg folate per 1/2 cup" },
        { name: "Sweet potatoes", icon: "🍠", section: "Produce", nutrients: ["fiber", "calcium"], note: "Vitamin A for baby's development" },
        { name: "Bananas", icon: "🍌", section: "Produce", nutrients: ["fiber"], note: "Potassium helps reduce leg cramps" },
        { name: "Avocados", icon: "🥑", section: "Produce", nutrients: ["folate", "fiber"], note: "90mcg folate per avocado" },
        { name: "Broccoli", icon: "🥦", section: "Produce", nutrients: ["folate", "calcium", "fiber", "iron"], note: "Multi-nutrient powerhouse" },
        { name: "Oranges", icon: "🍊", section: "Produce", nutrients: ["folate", "fiber"], note: "Vitamin C boosts iron absorption" },
        { name: "Berries (mixed)", icon: "🫐", section: "Produce", nutrients: ["fiber", "folate"], note: "Antioxidants + fiber" },
        // Protein
        { name: "Salmon (wild)", icon: "🐟", section: "Protein", nutrients: ["dha", "protein"], note: "Best source of omega-3 DHA" },
        { name: "Eggs (large, dozen)", icon: "🥚", section: "Protein", nutrients: ["choline", "protein", "iron"], note: "147mg choline per egg" },
        { name: "Chicken breast", icon: "🍗", section: "Protein", nutrients: ["protein", "iron"], note: "Lean protein, easy to prepare" },
        { name: "Lentils (dried)", icon: "🫘", section: "Protein", nutrients: ["iron", "folate", "protein", "fiber"], note: "Plant-based iron + folate" },
        { name: "Tofu (firm)", icon: "🧈", section: "Protein", nutrients: ["protein", "calcium", "iron"], note: "Calcium-set tofu: 250mg calcium" },
        { name: "Greek yogurt", icon: "🥛", section: "Dairy", nutrients: ["calcium", "protein"], note: "220mg calcium per serving" },
        { name: "Cheese (cheddar)", icon: "🧀", section: "Dairy", nutrients: ["calcium", "protein"], note: "Pasteurized only during pregnancy" },
        { name: "Milk (fortified)", icon: "🥛", section: "Dairy", nutrients: ["calcium", "protein", "choline"], note: "300mg calcium per cup" },
        // Grains & Pantry
        { name: "Oats (rolled)", icon: "🥣", section: "Grains & Pantry", nutrients: ["iron", "fiber"], note: "Whole grain, iron-fortified" },
        { name: "Quinoa", icon: "🌾", section: "Grains & Pantry", nutrients: ["protein", "iron", "fiber", "folate"], note: "Complete protein grain" },
        { name: "Fortified cereal", icon: "🥣", section: "Grains & Pantry", nutrients: ["iron", "folate"], note: "Check label: 100% DV iron & folate" },
        { name: "Whole wheat bread", icon: "🍞", section: "Grains & Pantry", nutrients: ["fiber", "iron", "folate"], note: "Choose fortified varieties" },
        { name: "Almonds", icon: "🥜", section: "Grains & Pantry", nutrients: ["calcium", "protein", "iron"], note: "76mg calcium per oz" },
        { name: "Chia seeds", icon: "🌱", section: "Grains & Pantry", nutrients: ["fiber", "calcium", "dha"], note: "ALA omega-3 + calcium" },
        { name: "Sardines (canned)", icon: "🐟", section: "Grains & Pantry", nutrients: ["dha", "calcium", "protein"], note: "DHA + edible bones = calcium" },
      ];

      // Score and filter items based on current nutrient gaps
      const scoredItems = groceryItems.map(item => {
        let score = 0;
        item.nutrients.forEach(n => {
          const gapIdx = topGapKeys.indexOf(n);
          if (gapIdx >= 0) score += (4 - gapIdx);
        });
        return { ...item, score };
      }).filter(item => item.score > 0).sort((a, b) => b.score - a.score);

      // Group by section
      const sections = {};
      scoredItems.forEach(item => {
        if (!sections[item.section]) sections[item.section] = [];
        sections[item.section].push(item);
      });
      const sectionOrder = ["Produce", "Protein", "Dairy", "Grains & Pantry"];
      const sectionIcons = { Produce: "🥬", Protein: "🥩", Dairy: "🥛", "Grains & Pantry": "🌾" };

      const greeting = (() => {
        const hour = new Date().getHours();
        return hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
      })();
      const displayName = userData.firstName || "Mama";

      const toggleCheckItem = (itemName) => {
        setCheckedItems(prev => {
          const newSet = new Set(prev);
          if (newSet.has(itemName)) {
            newSet.delete(itemName);
          } else {
            newSet.add(itemName);
          }
          return newSet;
        });
      };

      return (
        <div style={{ flex: 1, overflow: "auto", paddingBottom: 80, background: c.cream }}>
          {/* Header */}
          <div style={{ padding: "24px 20px 16px", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <p style={{ fontSize: 14, color: c.textLight, margin: "0 0 2px" }}>{greeting} 🌟</p>
              <h1 style={{ fontSize: 28, fontWeight: 800, color: c.textDark, margin: 0, fontFamily: "'Nunito', sans-serif" }}>{displayName}</h1>
            </div>
            <div style={{ width: 44, height: 44, borderRadius: 14, overflow: "hidden", flexShrink: 0 }}>
              <Logo size={44} />
            </div>
          </div>

          <div style={{ padding: "0 16px" }}>
            {/* Header with checked count */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div>
                <h3 style={{ fontSize: 15, fontWeight: 700, color: c.textDark, margin: "0 0 2px" }}>Smart Grocery List</h3>
                <p style={{ fontSize: 11, color: c.textMuted, margin: 0 }}>
                  {topGapKeys.length > 0
                    ? "Prioritized for your " + topGapKeys.slice(0, 3).join(", ") + " needs"
                    : "Great job - you're meeting most nutrient targets!"}
                </p>
              </div>
              {checkedItems.size > 0 && (
                <div style={{ background: c.mint, color: c.white, borderRadius: 20, padding: "6px 12px", fontSize: 12, fontWeight: 700 }}>
                  {checkedItems.size} checked
                </div>
              )}
            </div>

            {/* Grocery sections */}
            {sectionOrder.map(sec => {
              const items = sections[sec];

              return (
                <div key={sec} style={{ marginBottom: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>

                    const isChecked = checkedItems.has(item.name);
                    return (
                      <div key={i} onClick={() => toggleCheckItem(item.name)} style={{
                        background: c.white, borderRadius: 12, padding: "10px 14px", marginBottom: 6,
                        display: "flex", alignItems: "center", gap: 10,
                        border: "1.5px solid " + (isChecked ? c.mint : c.borderLight),
                        cursor: "pointer", opacity: isChecked ? 0.6 : 1, transition: "all 0.2s",
                      }}>
                        <span style={{ fontSize: 20 }}>{item.icon}</span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <p style={{
                            fontSize: 13, fontWeight: 600, color: c.textDark, margin: "0 0 2px",
                            textDecoration: isChecked ? "line-through" : "none",
                          }}>{item.name}</p>
                          <p style={{ fontSize: 10, color: c.textLight, margin: 0 }}>{item.note}</p>
                        </div>
                        <div style={{ display: "flex", gap: 3, flexShrink: 0, alignItems: "center" }}>
                          {item.nutrients.filter(n => topGapKeys.includes(n)).slice(0, 2).map((n, ni) => {
                            const nutrientColors = {
                              iron: c.orange, folate: c.mintDark, calcium: c.blue,
                              fiber: c.lavenderDark, protein: c.pinkDark, dha: "#5BA8D5", choline: "#D4A85B",
                            };
                            return (
                              <span key={ni} style={{
                                padding: "2px 6px", borderRadius: 6, fontSize: 9, fontWeight: 700,
                                background: (nutrientColors[n] || c.pink) + "18",
                                color: nutrientColors[n] || c.pink,
                              }}>{n}</span>
                            );
                          })}
                          {isChecked && <span style={{ fontSize: 16, marginLeft: 4 }}>✅</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}

            <p style={{ fontSize: 10, color: c.textMuted, margin: "16px 0", textAlign: "center" }}>
              Based on ACOG, USDA & NIH pregnancy nutrition guidelines
            </p>
          </div>
        </div>
      );
    }

    // --- Learn Screen ---
    function LearnScreen({ userData, meals, symptomLog, weightLog }) {
      const month = userData.month || 5;
      const trimester = month <= 3 ? 1 : month <= 6 ? 2 : 3;
      const trimesterLabel = trimester === 1 ? "First" : trimester === 2 ? "Second" : "Third";
      const tData = trimesterData[trimester];
      const nutrients = nutrientDeepDives[trimester] || nutrientDeepDives[1];

      const [expandedNutrient, setExpandedNutrient] = useState(null);
      const [showAllSafety, setShowAllSafety] = useState(false);

      const greeting = (() => {
        const hour = new Date().getHours();
        return hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
      })();
      const displayName = userData.firstName || "Mama";

      // Learn sub-tabs
      const learnTabs = [
        { key: "nutrients", label: "Nutrients", icon: "🧬" },
        { key: "safety", label: "Safety", icon: "⚠️" },
        { key: "provider", label: "Provider", icon: "🩺" },
        { key: "trends", label: "Trends", icon: "📊" },

      return (

                    padding: "8px 12px", borderRadius: 12, fontSize: 11, fontWeight: 700,

            </div>

            {/* ===== Nutrients Tab ===== */}
            {activeLearnTab === "nutrients" && (

                <h3 style={{ fontSize: 15, fontWeight: 700, color: c.textDark, margin: "0 0 4px" }}>Key Nutrients - {trimesterLabel} Trimester</h3>
                <p style={{ fontSize: 11, color: c.textMuted, margin: "0 0 12px" }}>Tap to learn more about each nutrient</p>

                {nutrients.map((n, i) => {
                  const isExpanded = expandedNutrient === i;
                  return (
                    <div key={i}
                      onClick={() => setExpandedNutrient(isExpanded ? null : i)}
                      style={{

                        <span style={{ fontSize: 24 }}>{n.icon}</span>

                          <p style={{ fontSize: 12, color: c.textLight, margin: 0 }}>RDA: {n.rda}</p>
                        </div>
                        <span style={{ fontSize: 14, color: c.textMuted, transform: isExpanded ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}>▼</span>
                      </div>
                      {isExpanded && (
                        <div style={{ padding: "0 16px 16px", borderTop: "1px solid " + c.borderLight }}>
                          <p style={{ fontSize: 13, color: c.textDark, lineHeight: 1.6, margin: "12px 0" }}>{n.why}</p>
                          <p style={{ fontSize: 11, fontWeight: 700, color: c.textMedium, margin: "0 0 8px", textTransform: "uppercase" }}>Top Food Sources</p>
                          {n.topFoods.map((food, fi) => (
                            <div key={fi} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                              <div style={{ width: 6, height: 6, borderRadius: 3, background: c.mint, flexShrink: 0 }} />

                          <p style={{ fontSize: 10, color: c.lavenderDark, margin: "10px 0 0", fontStyle: "italic" }}>Source: {n.source}</p>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ===== Safety Tab ===== */}
            {activeLearnTab === "safety" && (
              <div>
                <h3 style={{ fontSize: 15, fontWeight: 700, color: c.textDark, margin: "0 0 4px" }}>Foods to Avoid</h3>

                  <div key={i} style={{
                    background: c.white, borderRadius: 12, padding: "12px 14px", marginBottom: 8,
                    display: "flex", alignItems: "flex-start", gap: 10,
                    border: "1.5px solid " + c.borderLight,
                  }}>
                    <span style={{ fontSize: 20, flexShrink: 0 }}>{item.icon}</span>
                    <div style={{ flex: 1 }}>
                      <p style={{ fontSize: 13, fontWeight: 600, color: c.textDark, margin: "0 0 3px" }}>{item.name}</p>
                      <p style={{ fontSize: 11, color: c.textMedium, margin: "0 0 2px", lineHeight: 1.4 }}>{item.risk}</p>
                      <p style={{ fontSize: 10, color: c.lavenderDark, margin: 0, fontStyle: "italic" }}>{item.source}</p>
                    </div>
                  </div>

                {!showAllSafety && foodSafety.length > 4 && (
                  <button

                    style={{
                      display: "block", width: "100%", padding: "10px", borderRadius: 12,
                      border: "1.5px solid " + c.borderLight, background: c.white,
                      color: c.pink, fontSize: 13, fontWeight: 700, cursor: "pointer",
                      fontFamily: "'Nunito', sans-serif", marginBottom: 10,

                {/* Nutrition Summary */}

                  background: c.white, borderRadius: 14, padding: "16px", marginBottom: 10,
                  border: "1.5px solid " + c.borderLight,

                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                    <span style={{ fontSize: 16 }}>🥗</span>
                    <h4 style={{ fontSize: 13, fontWeight: 700, color: c.textDark, margin: 0 }}>Nutrition Overview</h4>

                  {(() => {
                    const avgCalories = meals.length > 0 ? Math.round(meals.reduce((s, m) => s + (m.calories || 0) * (m.qty || 1), 0)) : 0;
                    const nutrientStatus = [
                      { name: "Iron", pct: 78, color: c.orange },
                      { name: "Folate", pct: 92, color: c.mintDark },
                      { name: "Calcium", pct: 65, color: c.blue },
                      { name: "Protein", pct: 88, color: c.pinkDark },
                      { name: "DHA", pct: 45, color: "#5BA8D5" },
                      { name: "Choline", pct: 52, color: "#D4A85B" },
                    ];
                    return (
                      <>
                        <p style={{ fontSize: 12, color: c.textMedium, margin: "0 0 10px" }}>

                        </p>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>

                              <p style={{ fontSize: 10, color: c.textMedium, margin: 0 }}>{ns.name}</p>
                            </div>

                        </div>

                  })()}
                </div>

                {/* Weight Trend */}
                <div style={{
                  background: c.white, borderRadius: 14, padding: "16px", marginBottom: 10,
                  border: "1.5px solid " + c.borderLight,

                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                    <span style={{ fontSize: 16 }}>⚖️</span>
                    <h4 style={{ fontSize: 13, fontWeight: 700, color: c.textDark, margin: 0 }}>Weight Trend</h4>

                  {weightLog && weightLog.length >= 2 ? (

                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                        <p style={{ fontSize: 12, color: c.textMedium, margin: 0 }}>
                          Current: <strong>{weightLog[weightLog.length - 1].weight} lbs</strong>

                        <p style={{ fontSize: 11, color: c.textLight, margin: 0 }}>
                          Gain: +{weightLog[weightLog.length - 1].weight - weightLog[0].weight} lbs
                        </p>
                      </div>
                      <p style={{ fontSize: 10, color: c.textMuted, margin: "6px 0 0" }}>
                        ACOG recommended range for your BMI: 25-35 lbs total
                      </p>
                    </div>
                  ) : (
                    <p style={{ fontSize: 12, color: c.textMuted, margin: 0 }}>Start logging weight on your Profile to see trends here.</p>
                  )}
                </div>

                {/* Recent Symptoms */}
                <div style={{
                  background: c.white, borderRadius: 14, padding: "16px", marginBottom: 10,
                  border: "1.5px solid " + c.borderLight,

                    <h4 style={{ fontSize: 13, fontWeight: 700, color: c.textDark, margin: 0 }}>Recent Symptoms</h4>
                  </div>
                  {symptomLog && symptomLog.length > 0 ? (
                    <div>
                      {symptomLog.slice(0, 3).map((entry, i) => {
                        const d = new Date(entry.date + "T00:00:00");
                        const dayLabel = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
                        return (
                          <div key={i} style={{ marginBottom: i < 2 ? 8 : 0 }}>
                            <p style={{ fontSize: 11, fontWeight: 700, color: c.textMedium, margin: "0 0 4px" }}>{dayLabel}</p>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                              {entry.symptoms.map((s, si) => (

                              {entry.symptoms.length === 0 && <span style={{ fontSize: 11, color: c.textMuted }}>No symptoms reported</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    <p style={{ fontSize: 12, color: c.textMuted, margin: 0 }}>Start logging symptoms on the Home page to see them here.</p>

                </div>

                {/* Prenatal Compliance */}
                <div style={{
                  background: c.white, borderRadius: 14, padding: "16px", marginBottom: 10,

                  <p style={{ fontSize: 12, color: c.textMedium, margin: 0 }}>Taken <strong>6 of 7 days</strong> this week (86%)</p>
                  <div style={{ display: "flex", gap: 3, marginTop: 8 }}>

                  background: "linear-gradient(135deg, " + c.pink + ", " + c.pinkDark + ")",

                  📤 Share Summary with Provider

                <p style={{ fontSize: 10, color: c.textMuted, margin: "0 0 10px", textAlign: "center" }}>Generates a PDF summary you can email or print</p>

    // --- Profile Screen ---
    function ProfileScreen({ userData, weightLog, setWeightLog }) {
      const month = userData.month || 5;
      const trimester = month <= 3 ? 1 : month <= 6 ? 2 : 3;
      const tData = trimesterData[trimester];
      const baby = babyDevelopment[month] || babyDevelopment[5];

      // Pregnancy progress
      const totalWeeks = 40;
      const currentWeek = Math.min(Math.round(month * 4.33), totalWeeks);
      const weeksLeft = Math.max(0, totalWeeks - currentWeek);
      const progressPct = Math.min(100, Math.round((currentWeek / totalWeeks) * 100));

      // Initials avatar
      const initials = ((userData.firstName || "D")[0] + (userData.lastName || "D")[0]).toUpperCase();

      // Activity label
      const activityLabels = { sedentary: "Sedentary", light: "Lightly Active", moderate: "Moderately Active", active: "Very Active" };

      // Country label
      const countryLabels = { US: "United States", UK: "United Kingdom", CA: "Canada", AU: "Australia", OTHER: "Other" };

      // Format due date
      const formatDate = (d) => {
        if (!d) return "Not provided";
        const date = new Date(d + "T00:00:00");
        return date.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
      };

      return (
        <div style={{ flex: 1, overflow: "auto", paddingBottom: 80, background: c.cream }}>
          {/* Header — matching other pages */}
          <div style={{ padding: "24px 20px 16px", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <p style={{ fontSize: 14, color: c.textLight, margin: "0 0 2px" }}>Your Profile</p>
              <h1 style={{ fontSize: 28, fontWeight: 800, color: c.textDark, margin: 0, fontFamily: "'Nunito', sans-serif" }}>{userData.firstName || "Mama"}</h1>
            </div>
            <div style={{ width: 44, height: 44, borderRadius: 14, overflow: "hidden", flexShrink: 0 }}>
              <Logo size={44} />
            </div>
          </div>

          <div style={{ padding: "0 16px" }}>

            {/* ===== Profile Card with Avatar ===== */}
            <div style={{
              background: `linear-gradient(135deg, ${c.pinkPale}, ${c.lavender})`,
              borderRadius: 18, padding: "20px", marginBottom: 16,
              display: "flex", alignItems: "center", gap: 16,
            }}>
              <div style={{
                width: 60, height: 60, borderRadius: 20, flexShrink: 0,
                background: `linear-gradient(135deg, ${c.pink}, ${c.pinkDark})`,
                display: "flex", alignItems: "center", justifyContent: "center",
                color: c.white, fontSize: 22, fontWeight: 800, fontFamily: "'Nunito', sans-serif",
                boxShadow: "0 4px 12px rgba(212,104,127,0.3)",
              }}>{initials}</div>
              <div style={{ flex: 1 }}>
                <p style={{ fontSize: 18, fontWeight: 800, color: c.textDark, margin: "0 0 2px", fontFamily: "'Nunito', sans-serif" }}>
                  {userData.firstName} {userData.lastName}
                </p>
                <p style={{ fontSize: 12, color: c.textMedium, margin: "0 0 4px" }}>{userData.email}</p>
                <p style={{ fontSize: 11, color: c.textLight, margin: 0 }}>
                  {countryLabels[userData.country] || userData.country || ""}
                  {userData.dob ? " - Born " + formatDate(userData.dob) : ""}
                </p>
              </div>
            </div>

            {/* ===== Pregnancy Progress ===== */}
            <div style={{
              background: c.white, borderRadius: 16, padding: "18px", marginBottom: 16,
              border: "1.5px solid " + c.borderLight,
            }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                <h3 style={{ fontSize: 14, fontWeight: 700, color: c.textDark, margin: 0 }}>Pregnancy Journey</h3>
                <span style={{ fontSize: 20 }}>{baby.sizeEmoji}</span>
              </div>

              {/* Progress bar */}
              <div style={{ height: 10, borderRadius: 5, background: c.borderLight, marginBottom: 10, position: "relative", overflow: "hidden" }}>
                <div style={{
                  height: 10, borderRadius: 5,
                  background: `linear-gradient(90deg, ${c.pinkLight}, ${c.pink})`,
                  width: progressPct + "%", transition: "width 0.5s ease",
                }} />
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
                <p style={{ fontSize: 11, color: c.textMuted, margin: 0 }}>Week {currentWeek} of {totalWeeks}</p>
                <p style={{ fontSize: 11, color: c.pink, fontWeight: 700, margin: 0 }}>{weeksLeft} weeks to go</p>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                <div style={{ background: c.pinkPale, borderRadius: 10, padding: "8px", textAlign: "center" }}>
                  <p style={{ fontSize: 14, fontWeight: 800, color: c.pinkDark, margin: "0 0 1px" }}>Month {month}</p>
                  <p style={{ fontSize: 10, color: c.textMedium, margin: 0 }}>Current</p>
                </div>
                <div style={{ background: c.mintBg, borderRadius: 10, padding: "8px", textAlign: "center" }}>
                  <p style={{ fontSize: 14, fontWeight: 800, color: c.mintDark, margin: "0 0 1px" }}>{formatDate(userData.dueDate).split(",")[0] || "TBD"}</p>
                  <p style={{ fontSize: 10, color: c.textMedium, margin: 0 }}>Due Date</p>
                </div>
                <div style={{ background: c.butterBg, borderRadius: 10, padding: "8px", textAlign: "center" }}>
                  <p style={{ fontSize: 14, fontWeight: 800, color: c.orange, margin: "0 0 1px" }}>{userData.numBabies === "2" ? "Twins" : userData.numBabies === "3" ? "Triplets" : "1 Baby"}</p>
                  <p style={{ fontSize: 10, color: c.textMedium, margin: 0 }}>Expecting</p>
                </div>
              </div>
            </div>

            {/* ===== Weight Gain Tracker ===== */}
            {(() => {
              const preWeight = parseFloat(userData.preWeight) || 140;
              const bmi = preWeight / Math.pow((parseFloat(userData.height) || 65) * 0.0254 / 0.3048 * 0.3048, 2) * 703;
              // ACOG weight gain guidelines by pre-pregnancy BMI
              const gainRange = bmi < 18.5 ? [28, 40] : bmi < 25 ? [25, 35] : bmi < 30 ? [15, 25] : [11, 20];
              const latestWeight = weightLog.length > 0 ? weightLog[weightLog.length - 1].weight : preWeight;
              const totalGain = latestWeight - preWeight;
              const [showWeightInput, setShowWeightInput] = React.useState(false);
              const [newWeight, setNewWeight] = React.useState("");

              const addWeight = () => {
                const w = parseFloat(newWeight);
                if (w > 0) {
                  setWeightLog(prev => [...prev, { date: new Date().toISOString().split("T")[0], weight: w }]);
                  setNewWeight("");
                  setShowWeightInput(false);
                }
              };

              // Simple chart using SVG
              const chartW = 280, chartH = 80;
              const minW = preWeight - 2;
              const maxW = preWeight + gainRange[1] + 5;
              const points = weightLog.map((entry, i) => {
                const x = weightLog.length > 1 ? (i / (weightLog.length - 1)) * chartW : chartW / 2;
                const y = chartH - ((entry.weight - minW) / (maxW - minW)) * chartH;
                return { x, y };
              });
              const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p.x + "," + p.y).join(" ");

              return (
                <div style={{
                  background: c.white, borderRadius: 16, padding: "18px", marginBottom: 16,
                  border: "1.5px solid " + c.borderLight,

                      padding: "4px 10px", borderRadius: 8, border: "none", fontSize: 11, fontWeight: 700,
                      background: c.pinkPale, color: c.pinkDark, cursor: "pointer", fontFamily: "'Nunito', sans-serif",
                    }}>+ Log Weight</button>

                  {showWeightInput && (
                    <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                      <input type="number" placeholder="e.g. 155" value={newWeight} onChange={e => setNewWeight(e.target.value)}

                      <button onClick={addWeight} style={{
                        padding: "8px 16px", borderRadius: 10, border: "none", background: c.pink, color: c.white,
                        fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "'Nunito', sans-serif",
                      }}>Save</button>
                    </div>
                  )}

                  {/* Stats row */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
                    <div style={{ background: c.cream, borderRadius: 10, padding: "8px", textAlign: "center" }}>
                      <p style={{ fontSize: 15, fontWeight: 800, color: c.textDark, margin: "0 0 1px" }}>{latestWeight}</p>
                      <p style={{ fontSize: 10, color: c.textMuted, margin: 0 }}>Current lbs</p>
                    </div>
                    <div style={{ background: totalGain >= gainRange[0] && totalGain <= gainRange[1] ? c.mintBg : totalGain > gainRange[1] ? "#FFF0E0" : c.cream, borderRadius: 10, padding: "8px", textAlign: "center" }}>
                      <p style={{ fontSize: 15, fontWeight: 800, color: totalGain >= gainRange[0] && totalGain <= gainRange[1] ? c.mintDark : c.textDark, margin: "0 0 1px" }}>+{totalGain}</p>
                      <p style={{ fontSize: 10, color: c.textMuted, margin: 0 }}>Gained lbs</p>
                    </div>
                    <div style={{ background: c.cream, borderRadius: 10, padding: "8px", textAlign: "center" }}>
                      <p style={{ fontSize: 15, fontWeight: 800, color: c.textDark, margin: "0 0 1px" }}>{gainRange[0]}-{gainRange[1]}</p>
                      <p style={{ fontSize: 10, color: c.textMuted, margin: 0 }}>Goal range</p>
                    </div>
                  </div>

                  {/* Mini chart */}
                  {weightLog.length >= 2 && (
                    <svg width={chartW} height={chartH} viewBox={"0 0 " + chartW + " " + chartH} style={{ width: "100%", height: chartH }}>
                      {/* Goal range band */}
                      <rect x="0" y={chartH - ((preWeight + gainRange[1] - minW) / (maxW - minW)) * chartH}
                        width={chartW} height={((gainRange[1] - gainRange[0]) / (maxW - minW)) * chartH}
                        fill={c.mintBg} opacity="0.5" />
                      {/* Line */}
                      <path d={pathD} fill="none" stroke={c.pink} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                      {/* Points */}
                      {points.map((p, i) => (
                        <circle key={i} cx={p.x} cy={p.y} r="3.5" fill={c.pink} stroke={c.white} strokeWidth="1.5" />
                      ))}
                    </svg>
                  )}
                  <p style={{ fontSize: 10, color: c.textMuted, margin: "6px 0 0" }}>ACOG recommended gain for your BMI: {gainRange[0]}-{gainRange[1]} lbs</p>
                </div>
              );
            })()}

            {/* ===== Health Details ===== */}
            <div style={{
              background: c.white, borderRadius: 16, padding: "18px", marginBottom: 16,
              border: "1.5px solid " + c.borderLight,
            }}>
              <h3 style={{ fontSize: 14, fontWeight: 700, color: c.textDark, margin: "0 0 14px" }}>Health Details</h3>

              {[
                { label: "Pre-pregnancy Weight", value: userData.preWeight ? userData.preWeight + " lbs" : "Not provided" },
                { label: "Current Weight", value: userData.curWeight ? userData.curWeight + " lbs" : "Not provided" },
                { label: "Height", value: userData.height ? Math.floor(userData.height / 12) + "'" + (userData.height % 12) + '"' : "Not provided" },

                </div>

              background: c.white, borderRadius: 16, padding: "18px", marginBottom: 16,
              border: "1.5px solid " + c.borderLight,

                  ))}
                </div>
              ) : (
                <p style={{ fontSize: 13, color: c.textLight, margin: 0 }}>No dietary restrictions set</p>
              )}
            </div>

            {/* ===== Settings ===== */}
            <div style={{
              background: c.white, borderRadius: 16, padding: "18px", marginBottom: 20,
              border: "1.5px solid " + c.borderLight,
            }}>
              <h3 style={{ fontSize: 14, fontWeight: 700, color: c.textDark, margin: "0 0 14px" }}>Settings</h3>

              {[
                { icon: "🔔", label: "Meal Reminders", detail: "3x daily" },
                { icon: "📊", label: "Weekly Reports", detail: "Enabled" },
                { icon: "🌙", label: "Dark Mode", detail: "Off" },
                { icon: "🔒", label: "Privacy", detail: "Data stored locally" },

              ].map((item, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 12,
                  padding: "10px 0",
                  borderBottom: i < 4 ? "1px solid " + c.borderLight : "none",
                }}>
                  <span style={{ fontSize: 18 }}>{item.icon}</span>
                  <p style={{ fontSize: 13, color: c.textDark, margin: 0, flex: 1 }}>{item.label}</p>
                  <p style={{ fontSize: 12, color: c.textLight, margin: 0 }}>{item.detail}</p>
                </div>
              ))}
            </div>

          </div>
        </div>
      );
    }

    // --- Tab Bar ---
    function TabBar({ activeTab, setActiveTab }) {
      const tabs = [
        { id: "home", label: "Home", icon: "🏠" },
        { id: "log", label: "Log", icon: "🍽️" },
        { id: "grocery", label: "Grocery", icon: "🛒" },
        { id: "tips", label: "Learn", icon: "📚" },
        { id: "profile", label: "Profile", icon: "👤" },
      ];
      return (
        <div style={{
          display: "flex", justifyContent: "space-around", alignItems: "center", height: 70,
          background: c.white, borderTop: `1px solid ${c.border}`, flexShrink: 0,
        }}>
          {tabs.map((tab) => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              style={{
                flex: 1, background: "none", border: "none", cursor: "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                color: activeTab === tab.id ? c.pink : c.textMuted,
                fontSize: 20, transition: "color 0.2s",
              }}
            >
              <span>{tab.icon}</span>
              <span style={{ fontSize: 11, fontWeight: 600 }}>{tab.label}</span>
            </button>
          ))}
        </div>
      );
    }

    // --- Toast ---
    function Toast({ meal, visible }) {
      return (
        <div style={{
          position: "absolute", bottom: 80, left: 20, right: 20,
          background: c.textDark, color: c.white, borderRadius: 18,
          padding: "14px 18px", display: "flex", alignItems: "center", gap: 10,
          transform: visible ? "translateY(0)" : "translateY(80px)",
          opacity: visible ? 1 : 0, transition: "all 0.3s ease",
          zIndex: 100, boxShadow: "0 8px 24px rgba(0,0,0,0.2)",
        }}>
          <span style={{ color: c.mint, fontSize: 18 }}>✓</span>
          <span style={{ fontSize: 14, fontWeight: 500 }}>{meal?.icon} {meal?.name} logged!</span>
        </div>
      );
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    // Sample data for direct screen previews
    const sampleUserData = {
      firstName: "Maxx", lastName: "Reiner", email: "maxx@email.com", dob: "1996-06-15", country: "US",
      isPregnant: true, lastPeriod: "2025-10-01", dueDate: "2026-07-08", month: 5,
      preWeight: "140", curWeight: "155", height: "65", numBabies: "1", activity: "moderate",
      restrictions: ["Gluten-free", "No raw fish"],
    };
    const sampleMeals = [
      { name: "Greek yogurt parfait", icon: "🥛", calories: 240, protein: 15, carbs: 32, fat: 6, iron: 0.5, folate: 30, calcium: 220, fiber: 2.0, category: "breakfast" },
      { name: "Avocado toast", icon: "🥑", calories: 380, protein: 12, carbs: 36, fat: 22, iron: 1.8, folate: 90, calcium: 40, fiber: 8.0, category: "breakfast" },
      { name: "Almonds", icon: "🥜", calories: 88, protein: 3.3, carbs: 3, fat: 7.6, iron: 0.5, folate: 7, calcium: 38, fiber: 1.8, category: "snack" },
    ];

    function DietDoula() {
      // Read URL hash to jump to a screen: #welcome, #account, #pregnancy, #body, #diet, #allset, #home, #log, #tips, #profile
      const hash = window.location.hash.replace("#", "") || "";
      const appTabs = ["home", "log", "grocery", "tips", "profile"];
      const isDirectTab = appTabs.includes(hash);
      const isDirectScreen = ["welcome", "terms", "account", "pregnancy", "body", "diet", "credentials", "allset"].includes(hash);
      const initScreen = isDirectTab ? "app" : isDirectScreen ? hash : "welcome";
      const initTab = isDirectTab ? hash : "home";
      const useSample = isDirectTab || isDirectScreen;

      const [screen, setScreen] = useState(initScreen);
      const [tab, setTab] = useState(initTab);
      const [userData, setUserData] = useState(useSample ? { ...sampleUserData } : {
        firstName: "", lastName: "", email: "", dob: "", country: "",
        isPregnant: true, lastPeriod: "", dueDate: "", month: null,
        preWeight: "", curWeight: "", height: "", numBabies: "1", activity: "",
        restrictions: [],
      });
      const [meals, setMeals] = useState(useSample ? [...sampleMeals] : []);
      const [toast, setToast] = useState({ visible: false, meal: null });
      // Hydration tracker (cups of water today)
      const [waterCups, setWaterCups] = useState(useSample ? 4 : 0);
      // Prenatal vitamin taken today
      const [prenatalTaken, setPrenatalTaken] = useState(false);
      // Weight log entries [{date, weight}]
      const [weightLog, setWeightLog] = useState(useSample ? [
        { date: "2025-11-01", weight: 142 }, { date: "2025-12-01", weight: 145 },
        { date: "2026-01-01", weight: 148 }, { date: "2026-02-01", weight: 152 },
        { date: "2026-03-01", weight: 155 },
      ] : []);
      // Symptom/craving journal entries [{date, symptoms:[], cravings:[], aversions:[], energy: 1-5, notes}]
      const [symptomLog, setSymptomLog] = useState(useSample ? [
        { date: "2026-03-15", symptoms: ["Heartburn", "Back pain"], cravings: ["Ice cream", "Pickles"], aversions: ["Coffee"], energy: 3, notes: "Feeling okay overall" },
        { date: "2026-03-14", symptoms: ["Fatigue"], cravings: ["Chocolate"], aversions: [], energy: 2, notes: "" },
      ] : []);
      const [showNotifPopup, setShowNotifPopup] = useState(false);

      const addMeal = useCallback((food) => {
        setMeals(prev => {
          // Check if same food already exists — increment qty
          const idx = prev.findIndex(m => m.name === food.name && m.category === food.category);
          if (idx >= 0) {
            const updated = [...prev];
            updated[idx] = { ...updated[idx], qty: (updated[idx].qty || 1) + 1 };
            return updated;
          }
          return [...prev, { ...food, qty: 1 }];
        });
        setToast({ visible: true, meal: food });
        setTimeout(() => setToast({ visible: false, meal: food }), 2500);
      }, []);

      const removeMeal = useCallback((name, category) => {
        setMeals(prev => {
          const idx = prev.findIndex(m => m.name === name && m.category === category);
          if (idx < 0) return prev;
          const item = prev[idx];
          if ((item.qty || 1) > 1) {
            const updated = [...prev];
            updated[idx] = { ...updated[idx], qty: item.qty - 1 };
            return updated;
          }
          return prev.filter((_, i) => i !== idx);
        });
      }, []);

      const renderContent = () => {
        switch (screen) {
          case "welcome": return <WelcomeScreen onStart={() => setScreen("terms")} />;
          case "terms": return <TermsScreen onAccept={() => setScreen("account")} onBack={() => setScreen("welcome")} />;
          case "account": return <AccountScreen data={userData} setData={setUserData} onNext={() => setScreen("pregnancy")} />;
          case "pregnancy": return <PregnancyScreen data={userData} setData={setUserData} onNext={() => setScreen("body")} onBack={() => setScreen("account")} />;
          case "body": return <BodyScreen data={userData} setData={setUserData} onNext={() => setScreen("diet")} onBack={() => setScreen("pregnancy")} />;
          case "diet": return <DietScreen data={userData} setData={setUserData} onNext={() => setScreen("credentials")} onBack={() => setScreen("body")} />;
          case "credentials": return (
            <React.Fragment>
              <CredentialsScreen data={userData} setData={setUserData} onNext={() => setShowNotifPopup(true)} onBack={() => setScreen("diet")} />
              {showNotifPopup && <NotificationPopup onContinue={(prefs) => { setUserData(d => ({ ...d, notifications: prefs })); setShowNotifPopup(false); setScreen("allset"); }} />}
            </React.Fragment>
          );
          case "allset": return <AllSetScreen data={userData} onFinish={() => setScreen("app")} />;
          case "app":
            switch (tab) {
              case "home": return <HomeScreen userData={userData} meals={meals} waterCups={waterCups} setWaterCups={setWaterCups} prenatalTaken={prenatalTaken} setPrenatalTaken={setPrenatalTaken} symptomLog={symptomLog} setSymptomLog={setSymptomLog} />;
              case "log": return <LogScreen onAdd={addMeal} onRemove={removeMeal} userData={userData} meals={meals} />;
              case "grocery": return <GroceryScreen userData={userData} meals={meals} />;
              case "tips": return <LearnScreen userData={userData} meals={meals} symptomLog={symptomLog} weightLog={weightLog} />;
              case "profile": return <ProfileScreen userData={userData} weightLog={weightLog} setWeightLog={setWeightLog} />;
              default: return <HomeScreen userData={userData} meals={meals} waterCups={waterCups} setWaterCups={setWaterCups} prenatalTaken={prenatalTaken} setPrenatalTaken={setPrenatalTaken} symptomLog={symptomLog} setSymptomLog={setSymptomLog} />;
            }
          default: return <WelcomeScreen onStart={() => setScreen("terms")} />;
        }
      };

      const isApp = screen === "app";
      const showPinkHeader = false;

      return (
        <div style={{
          minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
          background: `linear-gradient(135deg, ${c.pinkPale} 0%, ${c.cream} 50%, ${c.mintBg} 100%)`,
          padding: 20, fontFamily: "'Nunito', -apple-system, BlinkMacSystemFont, sans-serif",
        }}>
          <div style={{
            width: PHONE_W, height: PHONE_H, borderRadius: 44, overflow: "hidden",
            background: c.white, position: "relative", display: "flex", flexDirection: "column",
            boxShadow: "0 25px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04)",
          }}>
            {/* Status bar */}
            <div style={{
              height: 48, display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "0 28px", fontSize: 14, fontWeight: 600, flexShrink: 0,
              color: showPinkHeader ? c.white : c.textDark,
              background: showPinkHeader ? c.pink : screen === "welcome" ? "transparent" : c.cream,
            }}>
              <span>9:41</span>
              <div style={{ display: "flex", gap: 6, alignItems: "center", fontSize: 12 }}>
                <span>5G</span>
                <span>🔋</span>
              </div>
            </div>

            {/* Content */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
              <div style={{ flex: 1, overflow: "auto", display: "flex", flexDirection: "column" }}>
                {renderContent()}
              </div>
              {isApp && <TabBar activeTab={tab} setActiveTab={setTab} />}
            </div>

            <Toast meal={toast.meal} visible={toast.visible} />
          </div>
        </div>
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DietDoula />);
  </script>
</body>
</html>
